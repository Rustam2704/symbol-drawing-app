<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symbol Practice Pad</title>
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=11" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="left-rail" aria-label="Drawing actions">
        <button class="tool-button clear-button" id="clearButton" type="button" title="Clear drawing" aria-label="Clear drawing">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M6 6l1 15h10l1-15" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </svg>
        </button>
        <button class="tool-button undo-button" id="undoButton" type="button" title="Undo last stroke" aria-label="Undo last stroke" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M9 14l-5-5 5-5" />
            <path d="M4 9h10a6 6 0 1 1-4.24 10.24" />
          </svg>
        </button>
        <div class="color-palette" aria-label="Brush colors">
          <button class="color-swatch active" id="colorSwatch0" type="button" data-color-index="0" aria-label="Use recent color 1"></button>
          <button class="color-swatch" id="colorSwatch1" type="button" data-color-index="1" aria-label="Use recent color 2"></button>
          <button class="color-swatch" id="colorSwatch2" type="button" data-color-index="2" aria-label="Use recent color 3"></button>
          <button class="color-swatch color-picker-button" id="colorPickerButton" type="button" aria-label="Choose color">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
          </button>
          <input class="color-picker-input" id="colorPickerInput" type="color" value="#1f1d1a" aria-label="Choose custom brush color" />
        </div>
        <button class="swap-menu-button" id="swapMenuButton" type="button" aria-pressed="false">Swap Menu</button>
      </aside>

      <section class="workspace" aria-label="Practice canvas">
        <canvas id="practiceCanvas"></canvas>
      </section>

      <aside class="settings-panel" aria-label="Practice settings">
        <div class="panel-header">
          <h1>Practice Pad</h1>
          <p>Trace, clear, repeat.</p>
        </div>

        <div class="control-row">
          <label for="penSize">Pen <span id="penSizeValue"></span></label>
          <input id="penSize" type="range" min="1" max="48" value="8" step="0.1" />
        </div>

        <div class="control-row inline-toggle-row">
          <div class="text-toggle-group">
            <button class="text-toggle active" id="backgroundToggle" type="button" aria-pressed="true">Back</button>
            <button class="text-toggle active" id="gridToggle" type="button" aria-pressed="true">Grid</button>
          </div>
          <div>
            <label for="backgroundOpacity">Transp <span id="backgroundOpacityValue"></span></label>
            <input id="backgroundOpacity" type="range" min="0" max="1" value="0.8" step="0.01" />
          </div>
        </div>

        <div class="control-row">
          <label for="backgroundScale">Scale <span id="backgroundScaleValue"></span></label>
          <input id="backgroundScale" type="range" min="0.1" max="6" value="0.86" step="0.01" />
        </div>

        <div class="draw-mode-group" role="group" aria-label="Drawing mode">
            <button class="mode-button active" id="pointerModeButton" type="button" title="Pen" aria-label="Pen mode" aria-pressed="true">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m5 3 7 17 2.2-7.2L21 10Z" />
              </svg>
            </button>
            <button class="mode-button" id="handModeButton" type="button" title="Move page" aria-label="Move page" aria-pressed="false">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M7 12V6.5a1.5 1.5 0 0 1 3 0V12" />
                <path d="M10 11V5.5a1.5 1.5 0 0 1 3 0V12" />
                <path d="M13 11V7a1.5 1.5 0 0 1 3 0v6" />
                <path d="M16 12.5V10a1.5 1.5 0 0 1 3 0v4.5c0 4-2.6 6.5-6.4 6.5H11c-2.3 0-3.7-.8-5.1-2.6L3.8 15.7a1.6 1.6 0 0 1 2.5-2l1.1 1.3" />
              </svg>
            </button>
            <button class="mode-button" id="brushModeButton" type="button" title="Brush" aria-label="Brush mode" aria-pressed="false">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4 20c2.5.4 4.8-.2 6.2-1.6 1-1 .8-2.5-.2-3.4s-2.4-1-3.4 0C5.1 16.5 4.4 18 4 20Z" />
                <path d="m10 15 9-9a2.1 2.1 0 0 1 3 3l-9 9" />
                <path d="m15.5 5.5 3 3" />
              </svg>
            </button>
            <button class="mode-button" id="pressureModeButton" type="button" title="Pressure pen" aria-label="Pressure pen mode" aria-pressed="false">
              <img src="./sens-pen.png" alt="" />
            </button>
        </div>

        <div class="crop-button-row">
          <button class="secondary-button compact-button" id="cropButton" type="button" disabled>Select area</button>
          <button class="secondary-button compact-button" id="fileCropButton" type="button" disabled>Crop</button>
        </div>

        <button class="file-picker" id="chooseFileButton" type="button">Choose image or PDF</button>

        <section class="library-panel" aria-label="Image library">
          <div class="library-header">
            <span id="libraryTitle">Images</span>
            <input id="folderPathInput" class="folder-path-input" type="text" aria-label="Image folder path" spellcheck="false" />
            <button class="icon-small-button" id="refreshLibraryButton" type="button" title="Refresh" aria-label="Refresh images">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 11a8 8 0 0 0-14.7-4.4L3 9" />
                <path d="M3 4v5h5" />
                <path d="M4 13a8 8 0 0 0 14.7 4.4L21 15" />
                <path d="M21 20v-5h-5" />
              </svg>
            </button>
          </div>
          <div class="sort-toggle" role="group" aria-label="Sort images">
            <button class="sort-button active" id="sortByDateButton" type="button">Date</button>
            <button class="sort-button" id="sortByNameButton" type="button">Name</button>
          </div>
          <div class="library-list" id="libraryList" aria-live="polite"></div>
        </section>
      </aside>
    </main>

    <dialog class="crop-dialog" id="cropDialog" aria-labelledby="cropTitle">
      <form method="dialog" class="crop-panel">
        <div class="crop-header">
          <h2 id="cropTitle">Select area</h2>
          <button class="icon-button" id="closeCropButton" type="submit" aria-label="Close">x</button>
        </div>
        <canvas id="cropCanvas"></canvas>
        <div class="crop-actions">
          <button class="secondary-button" id="resetCropButton" type="button">Use full image</button>
          <button class="primary-button" id="applyCropButton" type="button">Apply area</button>
        </div>
      </form>
    </dialog>

    <dialog class="crop-dialog" id="fileCropDialog" aria-labelledby="fileCropTitle">
      <form method="dialog" class="crop-panel">
        <div class="crop-header">
          <h2 id="fileCropTitle">Crop image</h2>
          <button class="icon-button" id="closeFileCropButton" type="submit" aria-label="Close">x</button>
        </div>
        <canvas id="fileCropCanvas"></canvas>
        <div class="crop-actions">
          <button class="secondary-button" id="autoCropButton" type="button">Auto-crop</button>
          <button class="primary-button" id="applyFileCropButton" type="button">Apply crop</button>
        </div>
      </form>
    </dialog>

    <script src="./vendor/pdf.min.js"></script>
    <script type="module" src="./app.js?v=12"></script>
  </body>
</html>
