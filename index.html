<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Symbol Practice Pad</title>
    <link rel="icon" href="./favicon.svg?v=2" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=35" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="left-rail" aria-label="Drawing actions">
        <button class="tool-button clear-button" id="clearButton" type="button" title="Delete" aria-label="Clear drawing">
          <canvas class="gauntlet-animation" id="gauntletAnimation" width="80" height="80" aria-hidden="true"></canvas>
        </button>
        <button class="tool-button undo-button" id="undoButton" type="button" title="Backspace" aria-label="Undo last stroke" disabled>
          <canvas class="gauntlet-animation" id="timeGauntletAnimation" width="80" height="80" aria-hidden="true"></canvas>
        </button>
        <div class="color-palette" aria-label="Brush colors">
          <button class="color-swatch active" id="colorSwatch0" type="button" data-color-index="0" aria-label="Use recent color 1"></button>
          <button class="color-swatch" id="colorSwatch1" type="button" data-color-index="1" aria-label="Use recent color 2"></button>
          <button class="color-swatch" id="colorSwatch2" type="button" data-color-index="2" aria-label="Use recent color 3"></button>
          <button class="color-swatch color-picker-button" id="colorPickerButton" type="button" aria-label="Choose color">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 5v14" />
              <path d="M5 12h14" />
            </svg>
          </button>
          <div class="color-picker-panel" id="colorPickerPanel" role="dialog" aria-label="Brush color palette" hidden>
            <div class="color-picker-field" id="colorPickerField" aria-label="Color saturation and brightness">
              <span class="color-picker-field-thumb" id="colorPickerFieldThumb" aria-hidden="true"></span>
            </div>
            <input class="color-picker-hue" id="colorPickerHue" type="range" min="0" max="360" value="0" step="1" aria-label="Color hue" />
            <div class="color-picker-footer">
              <span class="color-picker-preview" id="colorPickerPreview" aria-hidden="true"></span>
              <input class="color-picker-hex" id="colorPickerHex" type="text" value="#1f1d1a" maxlength="7" spellcheck="false" aria-label="Hex color" />
            </div>
            <p>Click outside to apply</p>
          </div>
        </div>
        <div class="personal-theme-colors" role="group" aria-label="Personal theme colors">
          <button type="button" data-theme-color="paper" aria-label="Change canvas color" title="Canvas"></button>
          <button type="button" data-theme-color="panel" aria-label="Change panel color" title="Panels"></button>
          <button type="button" data-theme-color="ink" aria-label="Change text color" title="Text"></button>
          <button type="button" data-theme-color="line" aria-label="Change border color" title="Borders"></button>
          <button type="button" data-theme-color="accent" aria-label="Change accent color" title="Accent"></button>
          <button type="button" data-theme-color="accentStrong" aria-label="Change strong accent color" title="Strong accent"></button>
          <button type="button" data-theme-color="danger" aria-label="Change secondary accent color" title="Secondary accent"></button>
        </div>
        <div class="theme-switcher" role="group" aria-label="Color theme">
          <button class="theme-button theme-button-personal" id="personalThemeButton" type="button" aria-label="Personal theme" aria-pressed="false" title="Personal theme"><span></span><span></span><span></span><span></span></button>
          <button class="theme-button theme-button-current" id="currentThemeButton" type="button" aria-label="Current theme" aria-pressed="false" title="Current theme"><span></span><span></span><span></span><span></span></button>
          <button class="theme-button theme-button-dark active" id="darkThemeButton" type="button" aria-label="Dark theme" aria-pressed="true" title="Dark theme"><span></span><span></span><span></span><span></span></button>
          <button class="theme-button theme-button-violet" id="violetThemeButton" type="button" aria-label="Violet night theme" aria-pressed="false" title="Violet night theme"><span></span><span></span><span></span><span></span></button>
          <button class="theme-button theme-button-sunset" id="sunsetThemeButton" type="button" aria-label="Forest sunset theme" aria-pressed="false" title="Forest sunset theme"><span></span><span></span><span></span><span></span></button>
        </div>
        <button class="swap-menu-button" id="swapMenuButton" type="button" aria-pressed="false">Swap Menu</button>
      </aside>

      <section class="workspace" aria-label="Practice canvas">
        <canvas id="sceneBackgroundCanvas" width="1000" height="1000" aria-hidden="true"></canvas>
        <canvas id="practiceCanvas" width="1000" height="1000"></canvas>
        <canvas id="deleteEffectCanvas" width="1000" height="1000" aria-hidden="true"></canvas>
      </section>

      <aside class="settings-panel" aria-label="Practice settings">
        <div class="panel-header">
          <h1>Practice Pad</h1>
          <p>Trace, clear, repeat.</p>
        </div>

        <div class="control-row">
          <label for="penSize">Pen <span id="penSizeValue"></span></label>
          <div class="pen-range-control" id="penRangeControl">
            <input id="penSize" type="range" min="0" max="1000" value="715.6818820794937" step="any" />
            <span class="pen-thumb-preview" id="penThumbPreview" aria-hidden="true">
              <span class="pen-thumb-dot"></span>
              <span class="pen-thumb-ring"></span>
            </span>
          </div>
        </div>

        <div class="control-row inline-toggle-row">
          <div class="text-toggle-group">
            <button class="text-toggle active" id="backgroundToggle" type="button" aria-pressed="true">Back</button>
            <button class="text-toggle active" id="gridToggle" type="button" aria-pressed="true">Grid</button>
          </div>
          <div>
            <label for="backgroundOpacity">Transp <span id="backgroundOpacityValue"></span></label>
            <input id="backgroundOpacity" type="range" min="0" max="1" value="0.8" step="0.01" />
          </div>
        </div>

        <div class="control-row">
          <label for="backgroundScale">Scale <span id="backgroundScaleValue"></span></label>
          <input id="backgroundScale" type="range" min="0" max="1000" value="500" step="1" />
        </div>

        <div class="draw-mode-group" role="group" aria-label="Drawing mode">
            <button class="mode-button" id="pointerModeButton" type="button" title="Pen" aria-label="Pen mode" aria-pressed="false">
              <svg class="pointer-mode-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M4.6121 4.6121 21.1121 12.1121 14.6121 14.6121l-2.5 6.5Z" />
              </svg>
            </button>
            <button class="mode-button" id="handModeButton" type="button" title="Move page" aria-label="Move page" aria-pressed="false">
              <span class="hand-outline-icon" aria-hidden="true"></span>
            </button>
            <button class="mode-button" id="brushModeButton" type="button" title="Brush" aria-label="Brush mode" aria-pressed="false">
              <span class="calligraphy-brush-icon" aria-hidden="true"></span>
            </button>
            <button class="mode-button active" id="pressureModeButton" type="button" title="Pressure pen" aria-label="Pressure pen mode" aria-pressed="true">
              <span class="pressure-pen-icon" aria-hidden="true"></span>
            </button>
        </div>

        <div class="crop-button-row">
          <button class="secondary-button compact-button" id="cropButton" type="button" disabled>Select area</button>
          <button class="secondary-button compact-button" id="fileCropButton" type="button" disabled>Crop</button>
        </div>

        <button class="file-picker" id="chooseFileButton" type="button">Choose image or PDF</button>

        <section class="library-panel" aria-label="Image library">
          <div class="library-header">
            <span id="libraryTitle">Images</span>
            <input id="folderPathInput" class="folder-path-input" type="text" aria-label="Image folder path" spellcheck="false" />
            <button class="icon-small-button" id="refreshLibraryButton" type="button" title="Refresh" aria-label="Refresh images">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M20 11a8 8 0 0 0-14.7-4.4L3 9" />
                <path d="M3 4v5h5" />
                <path d="M4 13a8 8 0 0 0 14.7 4.4L21 15" />
                <path d="M21 20v-5h-5" />
              </svg>
            </button>
          </div>
          <div class="sort-toggle" role="group" aria-label="Sort images">
            <button class="sort-button active" id="sortByDateButton" type="button">Date</button>
            <button class="sort-button" id="sortByNameButton" type="button">Name</button>
          </div>
          <div class="library-list" id="libraryList" aria-live="polite"></div>
        </section>
      </aside>
    </main>

    <dialog class="crop-dialog" id="cropDialog" aria-labelledby="cropTitle">
      <form method="dialog" class="crop-panel">
        <div class="crop-header">
          <h2 id="cropTitle">Select area</h2>
          <button class="icon-button" id="closeCropButton" type="submit" aria-label="Close">×</button>
        </div>
        <canvas id="cropCanvas"></canvas>
        <div class="crop-actions">
          <button class="secondary-button" id="resetCropButton" type="button">Use full image</button>
          <button class="primary-button" id="applyCropButton" type="button">Apply area</button>
        </div>
      </form>
    </dialog>

    <dialog class="crop-dialog" id="fileCropDialog" aria-labelledby="fileCropTitle">
      <form method="dialog" class="crop-panel">
        <div class="crop-header">
          <h2 id="fileCropTitle">Crop image</h2>
          <button class="icon-button" id="closeFileCropButton" type="submit" aria-label="Close">×</button>
        </div>
        <canvas id="fileCropCanvas"></canvas>
        <div class="crop-actions">
          <button class="secondary-button" id="autoCropButton" type="button">Auto-crop</button>
          <button class="primary-button" id="applyFileCropButton" type="button">Apply crop</button>
        </div>
      </form>
    </dialog>

    <script src="./vendor/pdf.min.js"></script>
    <script type="module" src="./app.js?v=layout-independent-undo"></script>
  </body>
</html>
